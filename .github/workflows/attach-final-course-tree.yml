name: Attach final course tree

on:
  push:
    paths:
      - '.github/workflows/attach-final-course-tree.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Create commit from completed curriculum tree and advance main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const finalTree = '8cd59072a6b311c5ecf853b9f83a47f681e4e4db';
            const { data: commit } = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'Complete ready-to-teach NOAI/IOAI curriculum V1',
              tree: finalTree,
              parents: [context.sha],
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: 'heads/main',
              sha: commit.sha,
              force: false,
            });
            core.info(`Advanced main to ${commit.sha}`);
