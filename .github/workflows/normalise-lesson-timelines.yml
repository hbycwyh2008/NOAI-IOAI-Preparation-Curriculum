name: Normalise lesson timelines

on:
  push:
    branches: [main]
    paths:
      - 'scripts/normalize_lesson_timelines.py'
      - 'scripts/validate_curriculum.py'
      - '02_Class_Missions/**'
      - '.github/workflows/normalise-lesson-timelines.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Add explicit timelines and update overview
        run: python scripts/normalize_lesson_timelines.py
      - name: Validate curriculum structure
        run: python scripts/validate_curriculum.py
      - name: Commit generated updates
        run: |
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 00_Course_Overview 02_Class_Missions
          git commit -m 'Add explicit timelines to every lesson'
          git push
